<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1066 600" width="1066" height="600">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#16245a"/>
      <stop offset="0.5" stop-color="#33508f"/>
      <stop offset="1" stop-color="#6b8fc4"/>
    </linearGradient>
    <linearGradient id="snow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#dcebfb"/>
      <stop offset="1" stop-color="#f3f9ff"/>
    </linearGradient>
    <radialGradient id="moon" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#fffefb"/>
      <stop offset="0.7" stop-color="#fdf6d8"/>
      <stop offset="1" stop-color="#fdf6d8" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bldg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2b3a63"/>
      <stop offset="1" stop-color="#1d2747"/>
    </linearGradient>
  </defs>

  <!-- sky -->
  <rect width="1066" height="600" fill="url(#sky)"/>
  <circle cx="880" cy="110" r="78" fill="url(#moon)"/>
  <circle cx="880" cy="110" r="40" fill="#fffdf2"/>
  <g fill="#ffffff" opacity="0.85">
    <circle cx="120" cy="80" r="2"/><circle cx="240" cy="140" r="1.6"/><circle cx="360" cy="60" r="2.2"/>
    <circle cx="500" cy="120" r="1.6"/><circle cx="640" cy="70" r="2"/><circle cx="760" cy="150" r="1.6"/>
    <circle cx="980" cy="90" r="2"/><circle cx="1020" cy="160" r="1.6"/><circle cx="60" cy="180" r="1.6"/>
    <circle cx="430" cy="180" r="1.4"/><circle cx="700" cy="200" r="1.4"/>
  </g>

  <!-- distant snowy hills -->
  <path d="M0 360 Q 180 280 380 350 T 760 340 T 1066 360 V600 H0 Z" fill="#9fb6da" opacity="0.7"/>
  <path d="M0 400 Q 260 330 540 390 T 1066 400 V600 H0 Z" fill="#bcd0ee" opacity="0.8"/>

  <!-- buildings -->
  <g>
    <rect x="40" y="250" width="150" height="170" rx="6" fill="url(#bldg)"/>
    <rect x="200" y="300" width="110" height="120" rx="6" fill="url(#bldg)"/>
    <rect x="760" y="270" width="150" height="150" rx="6" fill="url(#bldg)"/>
    <rect x="920" y="305" width="110" height="115" rx="6" fill="url(#bldg)"/>
    <!-- snow on roofs -->
    <rect x="40" y="246" width="150" height="12" rx="6" fill="#eef5ff"/>
    <rect x="200" y="296" width="110" height="11" rx="6" fill="#eef5ff"/>
    <rect x="760" y="266" width="150" height="12" rx="6" fill="#eef5ff"/>
    <rect x="920" y="301" width="110" height="11" rx="6" fill="#eef5ff"/>
    <!-- lit windows -->
    <g fill="#ffe39a" opacity="0.9">
      <rect x="60" y="276" width="20" height="22" rx="2"/><rect x="96" y="276" width="20" height="22" rx="2"/><rect x="132" y="276" width="20" height="22" rx="2"/>
      <rect x="60" y="320" width="20" height="22" rx="2"/><rect x="132" y="320" width="20" height="22" rx="2"/>
      <rect x="220" y="322" width="18" height="20" rx="2"/><rect x="272" y="322" width="18" height="20" rx="2"/>
      <rect x="784" y="296" width="20" height="22" rx="2"/><rect x="820" y="296" width="20" height="22" rx="2"/><rect x="866" y="296" width="20" height="22" rx="2"/>
      <rect x="940" y="328" width="18" height="20" rx="2"/><rect x="992" y="328" width="18" height="20" rx="2"/>
    </g>
  </g>

  <!-- clock tower -->
  <g>
    <rect x="507" y="200" width="52" height="150" rx="4" fill="#aab8d8"/>
    <rect x="503" y="196" width="60" height="12" rx="4" fill="#eef5ff"/>
    <polygon points="497,200 569,200 533,150" fill="#7a3b3b"/>
    <polygon points="497,200 569,200 533,170" fill="#8f4a4a"/>
    <circle cx="533" cy="244" r="18" fill="#fffdf2" stroke="#33405e" stroke-width="2"/>
    <line x1="533" y1="244" x2="533" y2="232" stroke="#33405e" stroke-width="2"/>
    <line x1="533" y1="244" x2="543" y2="248" stroke="#33405e" stroke-width="2"/>
  </g>

  <!-- snow ground -->
  <path d="M0 360 Q 533 320 1066 360 V600 H0 Z" fill="url(#snow)"/>
  <ellipse cx="180" cy="470" rx="150" ry="36" fill="#ffffff" opacity="0.6"/>
  <ellipse cx="560" cy="520" rx="220" ry="46" fill="#ffffff" opacity="0.55"/>
  <ellipse cx="900" cy="480" rx="170" ry="38" fill="#ffffff" opacity="0.6"/>

  <!-- lamp posts -->
  <g stroke="#2b3a5e" stroke-width="6" stroke-linecap="round">
    <line x1="120" y1="430" x2="120" y2="350"/>
    <line x1="946" y1="430" x2="946" y2="350"/>
  </g>
  <circle cx="120" cy="346" r="9" fill="#ffe39a"/><circle cx="120" cy="346" r="18" fill="#ffe39a" opacity="0.25"/>
  <circle cx="946" cy="346" r="9" fill="#ffe39a"/><circle cx="946" cy="346" r="18" fill="#ffe39a" opacity="0.25"/>
</svg>
