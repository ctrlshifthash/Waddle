# Render blueprint — ONE service: the Colyseus server also serves the built Vite
# site, so a single domain hosts both the game and the website.
# On render.com: New + → Blueprint → pick this repo, then fill the `sync: false`
# secrets in the dashboard.
services:
  - type: web
    name: waddle
    runtime: node
    plan: free        # NOTE: free has no persistent disk + sleeps when idle.
    region: oregon    # For the real SOL cap to survive restarts, use a paid plan,
    buildCommand: npm install --include=dev && npm run build --workspace client
    startCommand: npm run start --workspace server
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: SOL_FAUCET_ENABLED
        value: "true"
      - key: SOLANA_SETTLE_ENABLED
        value: "false"
      - key: SOLANA_PAYOUT_MODE
        value: mint
      - key: PRIVY_ENFORCE
        value: "false"
      # add a persistent disk and set DATA_DIR to its mount path on a paid plan
      # --- set these in the Render dashboard (kept out of the repo) ---
      - key: VITE_PRIVY_APP_ID       # Privy app id (public, baked into the build)
        sync: false
      - key: SOLANA_RPC_URL          # your Helius mainnet URL
        sync: false
      - key: SOLANA_TREASURY_SECRET  # base58 secret of the FUNDED treasury wallet
        sync: false
      - key: PRIVY_APP_ID
        sync: false
      - key: PRIVY_APP_SECRET
        sync: false
